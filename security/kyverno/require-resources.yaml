# nosemgrep: yaml.kubernetes.security.run-as-non-root.run-as-non-root
# This file defines a Kyverno ClusterPolicy, not a Pod manifest.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-requests-limits
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Containers must define cpu/memory requests and limits."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
                securityContext:
                  runAsNonRoot: true
