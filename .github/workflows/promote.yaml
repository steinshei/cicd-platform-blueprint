name: promote

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service name
        required: true
        default: sample-service
      image_tag:
        description: Git SHA tag promoted from staging to prod
        required: true

permissions:
  contents: write

jobs:
  promote-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update staging
        env:
          SERVICE: ${{ github.event.inputs.service }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          FILE="gitops/environments/staging/${SERVICE}-values.yaml"
          sed -i.bak -E "s|^  tag: .*|  tag: ${IMAGE_TAG}|" "$FILE"
          rm -f "$FILE.bak"

      - name: Commit staging
        env:
          SERVICE: ${{ github.event.inputs.service }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "gitops/environments/staging/${SERVICE}-values.yaml"
          git commit -m "promote(staging): ${SERVICE} ${IMAGE_TAG}"
          git push

      - name: DORA staging event
        env:
          SERVICE: ${{ github.event.inputs.service }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          ./scripts/collect_dora_event.sh deployment staging "${SERVICE}" "${IMAGE_TAG}" "success"

  promote-prod:
    runs-on: ubuntu-latest
    needs: [promote-staging]
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Policy gate (staging -> prod only)
        env:
          SERVICE: ${{ github.event.inputs.service }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          STAGING_TAG="$(awk '/^  tag:/ {print $2}' "gitops/environments/staging/${SERVICE}-values.yaml")"
          if [ "$STAGING_TAG" != "${IMAGE_TAG}" ]; then
            echo "Promotion denied: requested tag must already exist in staging"
            exit 1
          fi

      - name: Update prod
        env:
          SERVICE: ${{ github.event.inputs.service }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          FILE="gitops/environments/prod/${SERVICE}-values.yaml"
          sed -i.bak -E "s|^  tag: .*|  tag: ${IMAGE_TAG}|" "$FILE"
          rm -f "$FILE.bak"

      - name: Commit prod
        env:
          SERVICE: ${{ github.event.inputs.service }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "gitops/environments/prod/${SERVICE}-values.yaml"
          git commit -m "promote(prod): ${SERVICE} ${IMAGE_TAG}"
          git push

      - name: DORA prod event
        env:
          SERVICE: ${{ github.event.inputs.service }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          ./scripts/collect_dora_event.sh deployment prod "${SERVICE}" "${IMAGE_TAG}" "success"
