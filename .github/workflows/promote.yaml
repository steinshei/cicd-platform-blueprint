name: promote

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service name
        required: true
        default: sample-service
      image_tag:
        description: Git SHA tag promoted from staging to prod
        required: true

permissions:
  contents: write

jobs:
  promote-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update staging
        run: |
          set -euo pipefail
          FILE="gitops/environments/staging/${{ github.event.inputs.service }}-values.yaml"
          sed -i.bak -E "s|^  tag: .*|  tag: ${{ github.event.inputs.image_tag }}|" "$FILE"
          rm -f "$FILE.bak"

      - name: Commit staging
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/environments/staging/${{ github.event.inputs.service }}-values.yaml
          git commit -m "promote(staging): ${{ github.event.inputs.service }} ${{ github.event.inputs.image_tag }}"
          git push

      - name: DORA staging event
        run: |
          ./scripts/collect_dora_event.sh deployment staging "${{ github.event.inputs.service }}" "${{ github.event.inputs.image_tag }}" "success"

  promote-prod:
    runs-on: ubuntu-latest
    needs: [promote-staging]
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Policy gate (staging -> prod only)
        run: |
          set -euo pipefail
          STAGING_TAG="$(awk '/^  tag:/ {print $2}' gitops/environments/staging/${{ github.event.inputs.service }}-values.yaml)"
          if [ "$STAGING_TAG" != "${{ github.event.inputs.image_tag }}" ]; then
            echo "Promotion denied: requested tag must already exist in staging"
            exit 1
          fi

      - name: Update prod
        run: |
          set -euo pipefail
          FILE="gitops/environments/prod/${{ github.event.inputs.service }}-values.yaml"
          sed -i.bak -E "s|^  tag: .*|  tag: ${{ github.event.inputs.image_tag }}|" "$FILE"
          rm -f "$FILE.bak"

      - name: Commit prod
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/environments/prod/${{ github.event.inputs.service }}-values.yaml
          git commit -m "promote(prod): ${{ github.event.inputs.service }} ${{ github.event.inputs.image_tag }}"
          git push

      - name: DORA prod event
        run: |
          ./scripts/collect_dora_event.sh deployment prod "${{ github.event.inputs.service }}" "${{ github.event.inputs.image_tag }}" "success"
