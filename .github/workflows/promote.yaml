name: promote

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service name
        required: true
        default: sample-service
      image_tag:
        description: Git SHA tag promoted from staging to prod
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    uses: steinshei/platform-cicd/.github/workflows/reusable-promote.yml@v1.1
    with:
      service: ${{ github.event.inputs.service }}
      image_tag: ${{ github.event.inputs.image_tag }}
      staging_values_file: gitops/environments/staging/${{ github.event.inputs.service }}-values.yaml
      prod_values_file: gitops/environments/prod/${{ github.event.inputs.service }}-values.yaml
    secrets: inherit

  emit-dora-staging:
    needs: [promote]
    runs-on: ubuntu-latest
    env:
      SERVICE: ${{ github.event.inputs.service }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Emit staging DORA event
        run: |
          ./scripts/collect_dora_event.sh deployment staging "${SERVICE}" "${IMAGE_TAG}" "success"
      - name: Upload staging DORA event artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-event-staging-${{ github.run_id }}
          path: dora/events/*.json

  emit-dora-prod:
    needs: [promote]
    runs-on: ubuntu-latest
    env:
      SERVICE: ${{ github.event.inputs.service }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Emit prod DORA event
        run: |
          ./scripts/collect_dora_event.sh deployment prod "${SERVICE}" "${IMAGE_TAG}" "pending_approval"
      - name: Upload prod DORA event artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-event-prod-${{ github.run_id }}
          path: dora/events/*.json
