name: security-sast-platform

on:
  pull_request:
    branches: [develop, main, 'release/**']
  push:
    branches: [develop, main, 'release/**']

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  security:
    uses: steinshei/platform-cicd/.github/workflows/reusable-security-sast.yml@v1.1
    with:
      run_semgrep: true
