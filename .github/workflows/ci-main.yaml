# 该工作流用于在 pull request 和 push 到 main 分支时运行 CI 流水线，构建、测试、
# 扫描和签名容器镜像，并在成功后自动更新 dev 环境的 GitOps 配置，包含必要的权限设置和 DORA 事件收集。
name: ci-main

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  security-events: write
  attestations: write
  packages: write

jobs:
  pipeline:
    uses: steinshei/platform-cicd/.github/workflows/reusable-ci.yml@v1
    with:
      service_name: sample-service
      context_dir: apps/sample-service
      dockerfile: apps/sample-service/Dockerfile
      run_tests: true
    secrets: inherit

  update-dev-gitops:
    needs: [pipeline]
    if: github.event_name == 'push'
    uses: steinshei/platform-cicd/.github/workflows/reusable-deploy-dev.yml@v1
    with:
      service_name: sample-service
      values_file: gitops/environments/dev/sample-service-values.yaml
      image_tag: ${{ github.sha }}
      skip_if_deploy_commit: true
    secrets:
      ci_bot_token: ${{ secrets.CI_BOT_TOKEN }}

  emit-dora-dev:
    needs: [update-dev-gitops]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Emit DORA deployment event
        run: |
          ./scripts/collect_dora_event.sh deployment dev sample-service "${GITHUB_SHA}" "success"
