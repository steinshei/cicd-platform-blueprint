# 该工作流用于在 pull request 和 push 到 develop/release/main 分支时运行 CI 流水线。
# 其中仅 develop push 会自动推进 dev 环境，main 只用于稳定版本验证与审计。
name: ci-main

on:
  pull_request:
    branches: [develop, main, 'release/**']
  push:
    branches: [develop, main, 'release/**']

permissions:
  contents: write
  pull-requests: write
  id-token: write
  security-events: write
  attestations: write
  packages: write

jobs:
  pipeline:
    uses: steinshei/platform-cicd/.github/workflows/reusable-ci.yml@v1.1
    with:
      service_name: sample-service
      context_dir: apps/sample-service
      dockerfile: apps/sample-service/Dockerfile
      run_tests: true
    secrets: inherit

  update-dev-gitops:
    needs: [pipeline]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop' && !startsWith(github.event.head_commit.message, 'deploy(dev):')
    uses: steinshei/platform-cicd/.github/workflows/reusable-deploy-dev.yml@v1.1
    with:
      service_name: sample-service
      values_file: gitops/environments/dev/sample-service-values.yaml
      image_tag: ${{ github.sha }}
      skip_if_deploy_commit: true
    secrets:
      ci_bot_token: ${{ secrets.CI_BOT_TOKEN }}

  emit-dora-dev:
    needs: [update-dev-gitops]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Emit DORA deployment event
        run: |
          ./scripts/collect_dora_event.sh deployment dev sample-service "${GITHUB_SHA}" "success"
      - name: Upload DORA event artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-event-dev-${{ github.run_id }}
          path: dora/events/*.json
