apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: sample-service-success-rate
  namespace: {{ .Values.namespace }}
spec:
  metrics:
    - name: success-rate
      interval: 1m
      count: 3
      successCondition: result[0] >= 0.95
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local
          query: |
            sum(rate(http_requests_total{service="{{ .Values.nameOverride }}",status!~"5.."}[1m]))
            /
            sum(rate(http_requests_total{service="{{ .Values.nameOverride }}"}[1m]))
