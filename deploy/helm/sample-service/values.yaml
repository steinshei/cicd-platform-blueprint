nameOverride: sample-service
namespace: sample-service

image:
  repository: ghcr.io/steinshei/sample-service
  tag: bootstrap-dev
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

rollout:
  enableAnalysis: false
  prometheusAddress: http://prometheus-server.monitoring.svc.cluster.local
  replicas: 4
  stepsWithAnalysis:
    - setWeight: 5
    - analysis:
        templates:
          - templateName: sample-service-success-rate
    - pause:
        duration: 60s
    - setWeight: 20
    - analysis:
        templates:
          - templateName: sample-service-success-rate
    - pause:
        duration: 120s
    - setWeight: 50
    - analysis:
        templates:
          - templateName: sample-service-success-rate
    - pause:
        duration: 180s
    - setWeight: 100
  stepsWithoutAnalysis:
    - setWeight: 5
    - pause:
        duration: 60s
    - setWeight: 20
    - pause:
        duration: 120s
    - setWeight: 50
    - pause:
        duration: 180s
    - setWeight: 100
