nameOverride: sample-service
namespace: sample-service

image:
  repository: ghcr.io/your-org/sample-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

rollout:
  replicas: 4
  steps:
    - setWeight: 5
    - pause:
        duration: 60s
    - setWeight: 20
    - pause:
        duration: 120s
    - setWeight: 50
    - pause:
        duration: 180s
    - setWeight: 100
