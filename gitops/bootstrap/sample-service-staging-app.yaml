apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-service-staging
  namespace: argocd
spec:
  project: platform-apps
  source:
    repoURL: https://github.com/steinshei/cicd-platform-blueprint.git
    targetRevision: main
    path: deploy/helm/sample-service
    helm:
      parameters:
        - name: namespace
          value: sample-service-staging
      valueFiles:
        - ../../../gitops/environments/staging/sample-service-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-service-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
